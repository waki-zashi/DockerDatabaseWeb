version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: phonebook-postgres
    environment:
      POSTGRES_DB: phonebook
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - phonebook-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: phonebook-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@phonebook.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - phonebook-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped

  app:
    build: .
    container_name: phonebook-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/phonebook
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    networks:
      - phonebook-network
    restart: unless-stopped

volumes:
  postgres-data:
  pgadmin-data:

networks:
  phonebook-network:
    driver: bridge
