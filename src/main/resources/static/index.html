<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Телефонная книга</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📞 Телефонная книга</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Поиск по имени, телефону или заметке...">
            <button onclick="searchContacts()">🔍 Поиск</button>
            <button onclick="loadAllContacts()">Показать все</button>
        </div>
        
        <div class="form-section">
            <h2>➕ Добавить контакт</h2>
            <form id="contactForm">
                <input type="hidden" id="contactId">
                <input type="text" id="fullName" placeholder="ФИО *" required>
                <input type="tel" id="phoneNumber" placeholder="Телефон *" required>
                <textarea id="note" placeholder="Заметка (необязательно)"></textarea>
                <div class="form-buttons">
                    <button type="submit" class="save-btn">💾 Сохранить</button>
                    <button type="button" class="clear-btn" onclick="clearForm()">🔄 Очистить</button>
                </div>
            </form>
        </div>
        
        <div class="contacts-section">
            <h2>📋 Мои контакты</h2>
            <div id="contactsList" class="contacts-grid"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
