<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Phone Book</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search by name, phone or note...">
            <button onclick="searchContacts()">Search</button>
            <button onclick="loadAllContacts()">Show all</button>
        </div>
        
        <div class="form-section">
            <h2>Add contact</h2>
            <form id="contactForm">
                <input type="hidden" id="contactId">
                <input type="text" id="fullName" placeholder="Full name *" required>
                <input type="tel" id="phoneNumber" placeholder="Phone number *" required>
                <textarea id="note" placeholder="Note (optional)"></textarea>
                <div class="form-buttons">
                    <button type="submit" class="save-btn">Save</button>
                    <button type="button" class="clear-btn" onclick="clearForm()">Clear</button>
                </div>
            </form>
        </div>
        
        <div class="contacts-section">
            <h2>My contacts</h2>
            <div id="contactsList" class="contacts-grid"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
